name: wordmaster_dacn
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  
  # Google Sign In
  google_sign_in: ^6.3.0
  
  # State management
  provider: ^6.1.5+1
  get: ^4.7.2
  get_storage: ^2.1.1
  
  # HTTP requests
  http: ^1.2.2
  dio: ^5.7.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
  
  # Database
  sqflite: ^2.4.1
  mysql1: ^0.20.0
  path: ^1.9.0
  
  # Environment variables
  flutter_dotenv: ^6.0.0
  
  # Text to speech
  flutter_tts: ^4.2.3
  
  # Charts
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  
  # Utils
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.10.4
  json_serializable: ^6.11.3
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
 

