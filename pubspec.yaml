name: wordmaster_dacn
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  
  # State management
  provider: ^6.1.5+1
  
  # HTTP requests
  http: ^1.2.2
  
  # Database
  sqflite: ^2.4.1
  mysql1: ^0.20.0
  path: ^1.9.0
  
  # Environment variables
  flutter_dotenv: ^5.2.1
  
  # Text to speech
  flutter_tts: ^4.2.0
  
  # Local storage
  shared_preferences: ^2.3.3
  
  # Charts
  fl_chart: ^0.69.2
  
  # Utils
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - .env
